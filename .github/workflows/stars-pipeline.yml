name: Stars Pipeline — Scrape + Enrich + Export

on:
  schedule:
    - cron: '0 6 * * *'       # daily at 6am UTC
  workflow_dispatch:
    inputs:
      username:
        description: 'GitHub username to scrape'
        required: true
        type: string
      incremental:
        description: 'Incremental sync (only new stars)'
        type: boolean
        default: true

jobs:
  stars-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e .

      - name: Scrape stars
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          TARGET="${{ github.event.inputs.username || vars.STARS_USERNAME }}"
          if [ -z "$TARGET" ]; then
            echo "Set STARS_USERNAME repo variable or provide username via workflow_dispatch"
            exit 1
          fi
          ARGS="scrape $TARGET --max 500"
          if [ "${{ github.event.inputs.incremental }}" != "false" ]; then
            ARGS="$ARGS --incremental"
          fi
          python -m ghstars.cli $ARGS

      - name: Enrich with AI
        if: env.OPENAI_API_KEY != '' || env.DEEPSEEK_API_KEY != ''
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'deepseek' }}
        run: |
          python -m ghstars.cli enrich --force --limit 50

      - name: Export all formats
        run: python -m ghstars.cli export --format all

      - name: Upload exports artifact
        uses: actions/upload-artifact@v4
        with:
          name: stars-export
          path: exports/
          retention-days: 7
